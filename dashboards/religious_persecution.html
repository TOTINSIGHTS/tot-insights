<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Religious Persecution in Occupied Ukraine — TOT Insights</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
</head>
<body style="margin:0;padding:0;">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend,
  ResponsiveContainer, Cell, PieChart, Pie, LineChart, Line,
  ReferenceLine, LabelList } = Recharts;

const CRIMSON  = "#8B1A1A";
const GOLD     = "#C4960A";
const STEEL    = "#2E5B8A";
const MID      = "#999";
const LIGHT_BG = "#FDF9F5";
const DARK_TXT = "#1A1A1A";
const BORDER   = "#D4C9C0";

const tick = { fill: DARK_TXT, fontSize: 12, fontFamily: "Georgia, serif" };
const axisLabel = { fill: MID, fontSize: 11, fontFamily: "Arial, sans-serif" };

const suppressionData = [
  { name: "Ukrainian\nOrthodox (OCU)", before: 86,  after: 0,  pct: 100 },
  { name: "Greek\nCatholics (UGCC)", before: 49,  after: 0,  pct: 100 },
  { name: "Jehovah's\nWitnesses",    before: 83,  after: 0,  pct: 100 },
  { name: "Pentecostals /\nCharismatic", before: 366, after: 18, pct: 95 },
  { name: "Baptists",                before: 186, after: 9,  pct: 95 },
  { name: "Adventists",              before: 36,  after: 4,  pct: 90 },
];

const flatSuppression = suppressionData.map(d => ({
  ...d,
  name: d.name.replace(/\n/g, " "),
}));

const clergyData = [
  { name: "Killed / tortured\nto death",    value: 70,  color: CRIMSON },
  { name: "Abducted &\ntortured",            value: 200, color: "#B04040" },
  { name: "Kidnapped —\nfate unknown",       value: 20,  color: "#C07070" },
  { name: "Kidnapped,\nlater released",      value: 45,  color: "#D09090" },
  { name: "Killed in\nbombing / shelling",   value: 5,   color: "#A04020" },
];

const flatClergy = clergyData.map(d => ({ ...d, name: d.name.replace(/\n/g, " ") }));

const timelineData = [
  { year: "2014", events: 2,  label: "Crimea / Donbas occupied; first raids on Protestant churches; 50+ clergy affected" },
  { year: "2015", events: 4,  label: "DPR recognises only 4 denominations; Baptists, Pentecostals classified as 'sects'" },
  { year: "2016", events: 3,  label: "DPR Law on Religion: forced re-registration, lists of believers demanded" },
  { year: "2017", events: 4,  label: "Russia bans Jehovah's Witnesses nationally (Supreme Court); raids expand" },
  { year: "2018", events: 4,  label: "LPR stricter law; last UGCC church closed in occupied Donetsk; 200+ raids 2019–21" },
  { year: "2019–21", events: 5, label: "200+ documented raids on religious communities in this period alone" },
  { year: "Feb 2022", events: 9, label: "Full-scale invasion: repression becomes absolute. All denominations face ultimatum" },
  { year: "Dec 2022", events: 8, label: "UGCC formally banned in Zaporizhzhia Oblast; 630 structures destroyed / damaged" },
  { year: "May 2023", events: 7, label: "ROC annexes Berdyansk diocese; Fr Maksymov arrested, later sentenced to 14 years" },
  { year: "Summer 2023", events: 9, label: "All non-ROC religious activity effectively banned in Zaporizhzhia & Kherson oblasts" },
  { year: "2024–25", events: 10, label: "871 ROC structures registered in occupied territory; 67 clergy killed in total" },
];

const rocExpansion = [
  { year: "2014", roc: 762, protestant: 552, ugcc: 36, other: 120 },
  { year: "2018", roc: 700, protestant: 80,  ugcc: 0,  other: 20 },
  { year: "2022", roc: 650, protestant: 30,  ugcc: 0,  other: 5 },
  { year: "2025", roc: 836, protestant: 10,  ugcc: 0,  other: 0 },
];

const CustomTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: "#fff", border: `1px solid ${BORDER}`, padding: "10px 14px", fontFamily: "Arial, sans-serif", fontSize: 12, maxWidth: 260 }}>
      <p style={{ fontWeight: "bold", marginBottom: 4, color: DARK_TXT }}>{label}</p>
      {payload.map((p, i) => (
        <p key={i} style={{ color: p.color || DARK_TXT, margin: "2px 0" }}>
          {p.name}: <strong>{p.value?.toLocaleString()}</strong>
        </p>
      ))}
    </div>
  );
};

const TimelineTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  const d = timelineData.find(t => t.year === label);
  return (
    <div style={{ background: "#fff", border: `1px solid ${BORDER}`, padding: "10px 14px", fontFamily: "Arial, sans-serif", fontSize: 11, maxWidth: 300 }}>
      <p style={{ fontWeight: "bold", color: CRIMSON, marginBottom: 4 }}>{label}</p>
      <p style={{ color: DARK_TXT, lineHeight: 1.5 }}>{d?.label}</p>
    </div>
  );
};

function SectionHeader({ n, title, sub }) {
  return (
    <div style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 6 }}>
        <div style={{ width: 36, height: 36, borderRadius: "50%", background: CRIMSON, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "Georgia, serif", fontWeight: "bold", fontSize: 16, flexShrink: 0 }}>
          {n}

        <h2 style={{ margin: 0, fontFamily: "Georgia, serif", fontSize: 20, color: DARK_TXT }}>{title}</h2>
      </div>
      {sub && <p style={{ margin: "0 0 0 48px", color: MID, fontSize: 13, fontFamily: "Arial, sans-serif", lineHeight: 1.5 }}>{sub}</p>}
    </div>
  );
}

function StatBadge({ n, label, color = CRIMSON }) {
  return (
    <div style={{ textAlign: "center", flex: 1, padding: "16px 8px", background: "#FFF5F5", borderRadius: 8, border: `1px solid ${BORDER}` }}>
      <div style={{ fontFamily: "Georgia, serif", fontSize: 28, fontWeight: "bold", color, lineHeight: 1 }}>{n}</div>
      <div style={{ fontFamily: "Arial, sans-serif", fontSize: 11, color: MID, marginTop: 6, lineHeight: 1.4 }}>{label}</div>
    </div>
  );
}

            </ResponsiveContainer>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 16 }}>
              {[
                { year: "2014–2015", text: "First raids on Adventist and Protestant churches; DPR officially classifies evangelical denominations as 'sects'" },
