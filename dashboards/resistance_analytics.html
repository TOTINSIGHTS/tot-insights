<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Violent Resistance Activity: Monitoring Dashboard — TOT Insights</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
</head>
<body style="margin:0;padding:0;">
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { LineChart, Line, BarChart, Bar, PieChart, Pie, Cell, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, Area, AreaChart } = Recharts;


const NAVY = "#1a2744";
const NAVY_LIGHT = "#243560";
const GOLD = "#c9a84c";
const GOLD_LIGHT = "#e8c97a";
const CREAM = "#f5f0e8";
const SLATE = "#6b7a99";
const SLATE_LIGHT = "#8a96b0";
const RED_MUTED = "#8b3a3a";
const BLUE_MID = "#4a6fa5";
const GREEN_MID = "#4a8b6f";
const TEAL = "#3a7a8b";
const ORANGE = "#b5652a";

// --- DATA ---

const periods = [
  "Dec '24", "Jan '25a", "Jan '25b", "Feb '25a", "Feb '25b",
  "Mar '25a", "Mar '25b", "Apr '25a", "Apr '25b", "May '25a",
  "May '25b", "Jun '25a", "Jun '25b", "Jul '25a", "Jul '25b",
  "Aug '25a", "Aug '25b", "Sep '25a", "Sep '25b", "Oct '25a",
  "Oct '25b", "Nov '25a", "Nov '25b", "Dec '25a", "Dec '25b",
  "Dec '25c", "Jan '26a", "Jan '26b", "Feb '26a", "Feb '26b",
];

const periodLabels = [
  "25.12.24–13.01.25","14.01.25–30.01.25","31.01.25–13.02.25","13.02.25–27.02.25","28.02.25–13.03.25",
  "14.03.25–27.03.25","28.03.25–10.04.25","11.04.25–24.04.25","25.04.25–08.05.25","09.05.25–22.05.25",
  "22.05.25–05.06.25","05.06.25–18.06.25","18.06.25–02.07.25","03.07.25–16.07.25","17.07.25–30.07.25",
  "31.07.25–13.08.25","14.08.25–27.08.25","28.08.25–11.09.25","11.09.25–24.09.25","25.09.25–09.10.25",
  "10.10.25–23.10.25","23.10.25–06.11.25","06.11.25–19.11.25","19.11.25–04.12.25","04.12.25–18.12.25",
  "18.12.25–31.12.25","31.12.25–14.01.26","14.01.26–28.01.26","29.01.26–12.02.26","12.02.26–25.02.26",
];

// TOT (occupied territory) per period
const totCounts = [11,5,4,9,7,13,12,7,6,8,10,8,12,8,4,12,14,10,8,12,11,7,8,7,9,7,4,4,4,5];
// RF territory per period
const rfCounts  = [0,0,0,0,0,0,0,2,8,2,4,4,2,3,2,3,9,2,5,4,6,5,10,10,10,8,12,12,12,10];

const timeSeries = periods.map((p, i) => ({
  period: p,
  label: periodLabels[i],
  tot: totCounts[i],
  rf: rfCounts[i],
  total: totCounts[i] + rfCounts[i],
}));

const totCategories = [
  { name: "Vehicle attack", value: 64, color: GOLD },
  { name: "Other / sabotage", value: 87, color: SLATE },
  { name: "Railway / transport infra", value: 36, color: BLUE_MID },
  { name: "Critical infra / comms", value: 26, color: TEAL },
  { name: "Targeted killing", value: 24, color: RED_MUTED },
  { name: "Armed raid / personnel", value: 5, color: GREEN_MID },
  { name: "Intel / targeting support", value: 4, color: ORANGE },
];

const rfCategories = [
  { name: "Railway sabotage", value: 47, color: BLUE_MID },
  { name: "Other / sabotage", value: 40, color: SLATE },
  { name: "Power / electrical infra", value: 18, color: TEAL },
  { name: "Vehicle / transport", value: 17, color: GOLD },
  { name: "Fuel / munitions supply", value: 8, color: ORANGE },
  { name: "Defence industry", value: 5, color: GREEN_MID },
  { name: "Targeted killing", value: 4, color: RED_MUTED },
  { name: "Comms tower / signals", value: 2, color: NAVY_LIGHT },
];

const geoData = [
  { name: "Zaporizhzhia oblast", value: 65, color: GOLD },
  { name: "Kherson oblast", value: 58, color: BLUE_MID },
  { name: "Crimea", value: 37, color: TEAL },
  { name: "Donetsk oblast", value: 35, color: RED_MUTED },
  { name: "Unknown / unspecified", value: 30, color: SLATE },
  { name: "Luhansk oblast", value: 6, color: GREEN_MID },
];

const totTotal = 246;
const rfTotal = 141;
const grandTotal = totTotal + rfTotal;

const RADIAN = Math.PI / 180;
const renderPctLabel = ({ cx, cy, midAngle, innerRadius, outerRadius, percent }) => {
  if (percent < 0.06) return null;
  const r = innerRadius + (outerRadius - innerRadius) * 0.55;
  const x = cx + r * Math.cos(-midAngle * RADIAN);
  const y = cy + r * Math.sin(-midAngle * RADIAN);
  return (
    <text x={x} y={y} fill="white" textAnchor="middle" dominantBaseline="central" fontSize={11} fontWeight={700}>
      {Math.round(percent * 100)}%
    </text>
  );
};

const ChartTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  return (
    <div style={{ background: NAVY, border: `1px solid ${GOLD}`, padding: "10px 14px", borderRadius: 4, fontSize: 12, color: CREAM }}>
      <div style={{ color: GOLD, fontWeight: 700, marginBottom: 6 }}>{label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: p.color || p.fill }} />
          <span>{p.name}: <strong>{p.value}</strong></span>
        </div>
      ))}
    </div>
  );
};

const TimeTooltip = ({ active, payload, label }) => {
  if (!active || !payload?.length) return null;
  const d = timeSeries.find(t => t.period === label);
  return (
    <div style={{ background: NAVY, border: `1px solid ${GOLD}`, padding: "10px 14px", borderRadius: 4, fontSize: 12, color: CREAM }}>
      <div style={{ color: GOLD, fontWeight: 700, marginBottom: 4 }}>{d?.label || label}</div>
      {payload.map((p, i) => (
        <div key={i} style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 2 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: p.color || p.fill }} />
          <span>{p.name}: <strong>{p.value}</strong></span>
        </div>
      ))}
    </div>
  );
};

const StatCard = ({ value, label, sub, accent }) => (
  <div style={{ background: "white", border: "1px solid #ddd", borderTop: `3px solid ${accent}`, borderRadius: 6, padding: "18px 16px" }}>
    <div style={{ fontSize: 30, fontWeight: 700, color: NAVY, lineHeight: 1 }}>{value}</div>
    <div style={{ fontSize: 11, color: accent, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.1em", margin: "8px 0 4px" }}>{label}</div>
    <div style={{ fontSize: 11, color: SLATE }}>{sub}</div>
  </div>
);

const Legend2 = ({ data }) => (
  <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
    {data.map((d, i) => (
      <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12 }}>
        <div style={{ width: 12, height: 12, borderRadius: 2, background: d.color, flexShrink: 0 }} />
        <span style={{ flex: 1, color: NAVY }}>{d.name}</span>
        <span style={{ fontWeight: 700, color: NAVY }}>{d.value}</span>
        <span style={{ color: SLATE, minWidth: 32, textAlign: "right" }}>
          {Math.round(d.value / (d._total || 1) * 100)}%
        </span>
      </div>
    ))}
  </div>
);

const tabs = [
  { id: "overview", label: "Overview" },
  { id: "trend", label: "Trend" },
  { id: "tot", label: "Occupied Territory" },
  { id: "rf", label: "Russian Territory" },
  { id: "geo", label: "Geography" },
];

function ResistanceAnalytics() {
  const [activeTab, setActiveTab] = useState("overview");

  const peakPeriod = timeSeries.reduce((a, b) => b.total > a.total ? b : a);
  const rfOnset = "Apr '25"; // First RF incidents

  const quarterly = [
    { q: "Q1 2025", tot: totCounts.slice(0,6).reduce((a,b)=>a+b,0), rf: rfCounts.slice(0,6).reduce((a,b)=>a+b,0) },
    { q: "Q2 2025", tot: totCounts.slice(6,12).reduce((a,b)=>a+b,0), rf: rfCounts.slice(6,12).reduce((a,b)=>a+b,0) },
    { q: "Q3 2025", tot: totCounts.slice(12,18).reduce((a,b)=>a+b,0), rf: rfCounts.slice(12,18).reduce((a,b)=>a+b,0) },
    { q: "Q4 2025", tot: totCounts.slice(18,26).reduce((a,b)=>a+b,0), rf: rfCounts.slice(18,26).reduce((a,b)=>a+b,0) },
    { q: "Q1 2026*", tot: totCounts.slice(26).reduce((a,b)=>a+b,0), rf: rfCounts.slice(26).reduce((a,b)=>a+b,0) },
  ];

  return (
    <div style={{ fontFamily: "'Georgia', serif", background: CREAM, minHeight: "100vh", color: NAVY }}>
      {/* Header */}
      <div style={{ background: NAVY, padding: "24px 32px 20px", borderBottom: `3px solid ${GOLD}` }}>
        <div style={{ fontSize: 10, color: GOLD, letterSpacing: "0.18em", textTransform: "uppercase", marginBottom: 8 }}>
          TOT Insights · Resistance Monitoring
        </div>
        <h1 style={{ margin: 0, color: CREAM, fontSize: 22, fontWeight: 700 }}>
          Violent Resistance Activity
        </h1>
        <p style={{ margin: "6px 0 0", color: SLATE_LIGHT, fontSize: 13 }}>
          Dec 2024 – Feb 2026 · 387 verified incidents · Occupied territories &amp; Russian Federation
        </p>
      </div>

      {/* Tabs */}
      <div style={{ background: NAVY_LIGHT, display: "flex", borderBottom: `2px solid ${GOLD}`, overflowX: "auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setActiveTab(t.id)} style={{
            background: activeTab === t.id ? GOLD : "transparent",
            color: activeTab === t.id ? NAVY : CREAM,
            border: "none", padding: "12px 22px", fontSize: 13,
            fontFamily: "'Georgia', serif", fontWeight: activeTab === t.id ? 700 : 400,
            cursor: "pointer", whiteSpace: "nowrap", transition: "all 0.15s",
          }}>{t.label}</button>
        ))}
      </div>

      <div style={{ padding: "28px 32px", maxWidth: 960, margin: "0 auto" }}>

        {/* ── OVERVIEW ── */}
        {activeTab === "overview" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 14, marginBottom: 28 }}>
              <StatCard value={grandTotal} label="Total Verified Incidents" sub="Dec 2024 – Feb 2026" accent={NAVY} />
              <StatCard value={totTotal} label="Occupied Territory" sub="TOT — 30 biweekly periods" accent={BLUE_MID} />
              <StatCard value={rfTotal} label="Russian Federation" sub="Onset: Apr 2025" accent={RED_MUTED} />
              <StatCard value={peakPeriod.total} label="Peak Fortnight" sub={peakPeriod.label} accent={GOLD} />
            </div>

            {/* Stacked area mini */}
            <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px", marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                <div>
                  <h3 style={{ margin: 0, fontSize: 14, color: NAVY, fontWeight: 700 }}>Incidents Over Time</h3>
                  <p style={{ margin: "4px 0 0", fontSize: 12, color: SLATE }}>Biweekly totals — occupied territory vs Russian Federation</p>
                </div>
                <div style={{ display: "flex", gap: 16 }}>
                  {[["Occupied territory", BLUE_MID],["RF territory", RED_MUTED]].map(([l,c]) => (
                    <div key={l} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11 }}>
                      <div style={{ width: 10, height: 10, borderRadius: 2, background: c }} />
                      <span style={{ color: SLATE }}>{l}</span>
                    </div>
                  ))}
                </div>
              </div>
              <ResponsiveContainer width="100%" height={180}>
                <AreaChart data={timeSeries} margin={{ top: 4, right: 8, bottom: 4, left: -15 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                  <XAxis dataKey="period" tick={{ fontSize: 9, fill: SLATE }} interval={4} />
                  <YAxis tick={{ fontSize: 10, fill: SLATE }} />
                  <Tooltip content={<TimeTooltip />} />
                  <Area type="monotone" dataKey="rf" name="RF territory" stackId="1" stroke={RED_MUTED} fill={RED_MUTED} fillOpacity={0.7} />
                  <Area type="monotone" dataKey="tot" name="Occupied territory" stackId="1" stroke={BLUE_MID} fill={BLUE_MID} fillOpacity={0.7} />
                </AreaChart>
              </ResponsiveContainer>
            </div>

            {/* Two split cards */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20 }}>
              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "18px 20px" }}>
                <h3 style={{ margin: "0 0 12px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Quarterly Comparison</h3>
                <ResponsiveContainer width="100%" height={160}>
                  <BarChart data={quarterly} margin={{ top: 4, right: 8, bottom: 4, left: -15 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" vertical={false} />
                    <XAxis dataKey="q" tick={{ fontSize: 10, fill: SLATE }} />
                    <YAxis tick={{ fontSize: 10, fill: SLATE }} />
                    <Tooltip content={<ChartTooltip />} />
                    <Bar dataKey="tot" name="Occupied territory" stackId="a" fill={BLUE_MID} radius={[0,0,0,0]} />
                    <Bar dataKey="rf" name="RF territory" stackId="a" fill={RED_MUTED} radius={[3,3,0,0]} />
                  </BarChart>
                </ResponsiveContainer>
                <p style={{ margin: "10px 0 0", fontSize: 11, color: SLATE, fontStyle: "italic" }}>
                  * Q1 2026 partial (through 25 Feb)
                </p>
              </div>

              <div style={{ background: NAVY, border: `1px solid ${GOLD}`, borderRadius: 6, padding: "18px 20px" }}>
                <div style={{ fontSize: 10, color: GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>Key analytical observations</div>
                {[
                  ["RF monitoring onset", "Recording of RF-territory incidents began Apr 2025. Prior activity was not captured; the dataset does not imply operations began then."],
                  ["Escalating RF tempo", "RF-territory incidents rose sharply from Oct 2025, averaging 10–12/fortnight by Jan–Feb 2026 — comparable to TOT activity."],
                  ["TOT consistency", "Occupied-territory resistance maintained a steady base rate of 5–14 incidents per fortnight throughout the monitoring period."],
                ].map(([head, body], i) => (
                  <div key={i} style={{ marginBottom: i < 2 ? 14 : 0 }}>
                    <div style={{ fontSize: 12, color: GOLD_LIGHT, fontWeight: 700, marginBottom: 4 }}>{head}</div>
                    <div style={{ fontSize: 12, color: CREAM, lineHeight: 1.6 }}>{body}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* ── TREND ── */}
        {activeTab === "trend" && (
          <div>
            <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px", marginBottom: 20 }}>
              <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Biweekly Incident Count</h3>
              <p style={{ margin: "0 0 18px", fontSize: 12, color: SLATE }}>
                Occupied territory (blue) and Russian Federation (red) — stacked area, 30 reporting periods
              </p>
              <ResponsiveContainer width="100%" height={280}>
                <AreaChart data={timeSeries} margin={{ top: 8, right: 16, bottom: 8, left: -10 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                  <XAxis dataKey="period" tick={{ fontSize: 9, fill: SLATE }} interval={2} angle={-35} textAnchor="end" height={55} />
                  <YAxis tick={{ fontSize: 11, fill: SLATE }} />
                  <Tooltip content={<TimeTooltip />} />
                  <Area type="monotone" dataKey="rf" name="RF territory" stackId="1" stroke={RED_MUTED} fill={RED_MUTED} fillOpacity={0.75} />
                  <Area type="monotone" dataKey="tot" name="Occupied territory" stackId="1" stroke={BLUE_MID} fill={BLUE_MID} fillOpacity={0.75} />
                </AreaChart>
              </ResponsiveContainer>
            </div>

            <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
              <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Separate Tracks</h3>
              <p style={{ margin: "0 0 18px", fontSize: 12, color: SLATE }}>
                TOT and RF activity plotted independently
              </p>
              <ResponsiveContainer width="100%" height={220}>
                <LineChart data={timeSeries} margin={{ top: 8, right: 16, bottom: 8, left: -10 }}>
                  <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                  <XAxis dataKey="period" tick={{ fontSize: 9, fill: SLATE }} interval={2} angle={-35} textAnchor="end" height={55} />
                  <YAxis tick={{ fontSize: 11, fill: SLATE }} />
                  <Tooltip content={<TimeTooltip />} />
                  <Line type="monotone" dataKey="tot" name="Occupied territory" stroke={BLUE_MID} strokeWidth={2} dot={{ r: 2.5, fill: BLUE_MID }} />
                  <Line type="monotone" dataKey="rf" name="RF territory" stroke={RED_MUTED} strokeWidth={2} dot={{ r: 2.5, fill: RED_MUTED }} />
                </LineChart>
              </ResponsiveContainer>
            </div>
          </div>
        )}

        {/* ── TOT ── */}
        {activeTab === "tot" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22, marginBottom: 20 }}>
              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
                <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Incident Type Breakdown</h3>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: SLATE }}>Occupied territory · n = {totTotal}</p>
                <ResponsiveContainer width="100%" height={200}>
                  <PieChart>
                    <Pie data={totCategories} cx="50%" cy="50%" outerRadius={90} innerRadius={45} dataKey="value" labelLine={false} label={renderPctLabel}>
                      {totCategories.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip formatter={(v, n, p) => [v, p.payload.name]} />
                  </PieChart>
                </ResponsiveContainer>
                <Legend2 data={totCategories.map(d => ({ ...d, _total: totTotal }))} />
              </div>

              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
                <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>By Volume</h3>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: SLATE }}>Incident count per category</p>
                <ResponsiveContainer width="100%" height={240}>
                  <BarChart data={[...totCategories].sort((a,b)=>b.value-a.value)} layout="vertical" margin={{ left: 0, right: 30, top: 0, bottom: 0 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" horizontal={false} />
                    <XAxis type="number" tick={{ fontSize: 10, fill: SLATE }} />
                    <YAxis type="category" dataKey="name" tick={{ fontSize: 10, fill: SLATE }} width={160} />
                    <Tooltip content={<ChartTooltip />} />
                    <Bar dataKey="value" name="Incidents" radius={[0,3,3,0]}>
                      {[...totCategories].sort((a,b)=>b.value-a.value).map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Bar>
                  </BarChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div style={{ background: NAVY, border: `1px solid ${GOLD}`, borderRadius: 6, padding: "18px 22px" }}>
              <div style={{ fontSize: 10, color: GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>
                Analytical note — occupied territory
              </div>
              <p style={{ margin: 0, fontSize: 12, color: CREAM, lineHeight: 1.8 }}>
                Vehicle attacks (26%) and sabotage of transport infrastructure (15%) together account for over 40% of TOT incidents, consistent with systematic targeting of Russian logistical capacity. Targeted killings (10%) — including liquidations of occupation officials and collaborators — represent a persistent operational thread. The "other/sabotage" category (35%) captures a heterogeneous range of acts including arson of occupation premises, IED placement, and disruption of military equipment, many of which resist clean categorisation from open-source reporting.
              </p>
            </div>
          </div>
        )}

        {/* ── RF TERRITORY ── */}
        {activeTab === "rf" && (
          <div>
            <div style={{ background: "white", border: `2px solid ${RED_MUTED}`, borderRadius: 6, padding: "14px 20px", marginBottom: 20, display: "flex", gap: 16, alignItems: "center" }}>
              <div style={{ fontSize: 24, color: RED_MUTED }}>◆</div>
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: RED_MUTED }}>Operations into Russian Federation territory</div>
                <div style={{ fontSize: 12, color: SLATE, marginTop: 3 }}>
                  {rfTotal} verified incidents · Monitoring from Apr 2025 · Escalating through Q4 2025 – Q1 2026
                </div>
              </div>
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22, marginBottom: 20 }}>
              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
                <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Incident Type Breakdown</h3>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: SLATE }}>Russian Federation territory · n = {rfTotal}</p>
                <ResponsiveContainer width="100%" height={200}>
                  <PieChart>
                    <Pie data={rfCategories} cx="50%" cy="50%" outerRadius={90} innerRadius={45} dataKey="value" labelLine={false} label={renderPctLabel}>
                      {rfCategories.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip formatter={(v, n, p) => [v, p.payload.name]} />
                  </PieChart>
                </ResponsiveContainer>
                <Legend2 data={rfCategories.map(d => ({ ...d, _total: rfTotal }))} />
              </div>

              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
                <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>RF Tempo Over Time</h3>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: SLATE }}>Biweekly RF-territory incidents</p>
                <ResponsiveContainer width="100%" height={240}>
                  <AreaChart data={timeSeries} margin={{ top: 4, right: 8, bottom: 30, left: -15 }}>
                    <CartesianGrid strokeDasharray="3 3" stroke="#eee" />
                    <XAxis dataKey="period" tick={{ fontSize: 8, fill: SLATE }} interval={3} angle={-40} textAnchor="end" height={55} />
                    <YAxis tick={{ fontSize: 10, fill: SLATE }} />
                    <Tooltip content={<TimeTooltip />} />
                    <Area type="monotone" dataKey="rf" name="RF territory" stroke={RED_MUTED} fill={RED_MUTED} fillOpacity={0.6} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div style={{ background: NAVY, border: `1px solid ${GOLD}`, borderRadius: 6, padding: "18px 22px" }}>
              <div style={{ fontSize: 10, color: GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>
                Analytical note — Russian Federation territory
              </div>
              <p style={{ margin: 0, fontSize: 12, color: CREAM, lineHeight: 1.8 }}>
                Railway sabotage dominates RF-territory operations (33%), reflecting a clear strategic logic: disrupting military logistics along rail corridors serving the frontline. Power and electrical infrastructure attacks (13%) are the second most common category, consistent with targeting of defence-industrial facilities. RF-territory incidents have been monitored from April 2025; the dataset does not capture earlier activity. Within the monitoring window, the tempo escalated significantly through Q4 2025, reaching 10–12 incidents per fortnight by early 2026.
              </p>
            </div>
          </div>
        )}

        {/* ── GEOGRAPHY ── */}
        {activeTab === "geo" && (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 22, marginBottom: 20 }}>
              <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "20px 24px" }}>
                <h3 style={{ margin: "0 0 4px", fontSize: 14, color: NAVY, fontWeight: 700 }}>TOT Incidents by Region</h3>
                <p style={{ margin: "0 0 12px", fontSize: 12, color: SLATE }}>Occupied territory only · n = {totTotal} (excl. unknown)</p>
                <ResponsiveContainer width="100%" height={220}>
                  <PieChart>
                    <Pie data={geoData} cx="50%" cy="50%" outerRadius={95} innerRadius={48} dataKey="value" labelLine={false} label={renderPctLabel}>
                      {geoData.map((d, i) => <Cell key={i} fill={d.color} />)}
                    </Pie>
                    <Tooltip formatter={(v, n, p) => [v, p.payload.name]} />
                  </PieChart>
                </ResponsiveContainer>
                <Legend2 data={geoData.map(d => ({ ...d, _total: totTotal }))} />
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
                <div style={{ background: "white", border: "1px solid #ddd", borderRadius: 6, padding: "18px 20px" }}>
                  <h3 style={{ margin: "0 0 14px", fontSize: 14, color: NAVY, fontWeight: 700 }}>Proportional Breakdown</h3>
                  {geoData.map((g, i) => (
                    <div key={i} style={{ marginBottom: 12 }}>
                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, marginBottom: 4 }}>
                        <span>{g.name}</span>
                        <strong>{g.value} ({Math.round(g.value / totTotal * 100)}%)</strong>
                      </div>
                      <div style={{ background: "#eee", borderRadius: 3, height: 10 }}>
                        <div style={{ width: `${Math.round(g.value/totTotal*100)}%`, height: "100%", background: g.color, borderRadius: 3 }} />
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ background: NAVY, border: `1px solid ${GOLD}`, borderRadius: 6, padding: "18px 22px" }}>
              <div style={{ fontSize: 10, color: GOLD, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 12 }}>
                Analytical note — geography
              </div>
              <p style={{ margin: 0, fontSize: 12, color: CREAM, lineHeight: 1.8 }}>
                Zaporizhzhia and Kherson oblasts together account for 50% of TOT-recorded incidents, significantly elevated relative to their population share among the occupied territories. This likely reflects proximity to the frontline creating opportunities for intelligence-supported operations, the strategic value of transport and energy infrastructure in these oblasts, and the relative density of monitoring coverage in the south. Crimea's 15% share is notable given its decade-long occupation and the consequent displacement and attrition of populations most likely to engage in active resistance.
              </p>
            </div>
          </div>
        )}

      </div>

      <div style={{ borderTop: "1px solid #ddd", padding: "12px 32px", display: "flex", justifyContent: "space-between", fontSize: 11, color: SLATE }}>
        <span>TOT Insights · Resistance Monitoring Dataset</span>
        <span>n = 387 verified violent incidents · Dec 2024 – Feb 2026</span>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<ResistanceAnalytics />);
</script>
</body>
</html>
